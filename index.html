<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SPY Chat v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050911; color: #fff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 800px; height: 90vh; border: 2px solid #00f2ff; display: flex; flex-direction: column; background: #0b111e; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; }
        .msg { margin-bottom: 10px; border-left: 3px solid #ff00ea; padding-left: 10px; padding-top: 5px; }
        .user-id { font-size: 9px; color: #555; display: block; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #00f2ff; }
        input, button { padding: 10px; background: #131c2e; border: 1px solid #00f2ff; color: #fff; }
        #admin-btn { border: 1px solid #ff00ea; color: #ff00ea; cursor: pointer; font-size: 10px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <button id="admin-btn" onclick="loginAdmin()">ADMİN</button>
        <input type="text" id="username" placeholder="Rumuzunuz..." style="width: 100px;">
        <input type="text" id="message" placeholder="Mesaj yaz...">
        <button onclick="sendMessage()">GÖNDER</button>
    </div>
</div>

<script>
    const supabaseClient = window.supabase.createClient(
        "https://fgfqczltsnwybvduecbs.supabase.co", 
        "sb_publishable_vhHGhg9CqIMjrrOwdVwFeg_vEBQGArF"
    );

    // 1. İsimi Hatırlama
    const usernameInput = document.getElementById('username');
    usernameInput.value = localStorage.getItem('spy_username') || '';

    let userId = localStorage.getItem('spy_uid') || 'U-' + Math.floor(Math.random()*10000);
    localStorage.setItem('spy_uid', userId);
    let isAdmin = localStorage.getItem('is_admin') === 'true';

    function loginAdmin() {
        const pass = prompt("Admin Şifresini Girin:");
        if (pass === "spy1232IıIıııIIIIıııIII3") {
            localStorage.setItem('is_admin', 'true');
            isAdmin = true;
            alert("Admin yetkisi aktif edildi!");
        } else {
            alert("Hatalı şifre!");
        }
    }

    async function sendMessage() {
        const user = usernameInput.value.trim();
        const text = document.getElementById('message').value.trim();
        
        if(!user || !text) return alert("Rumuz ve mesaj boş bırakılamaz!");

        // Aynı isim kontrolü: Veritabanında aynı isimde son mesajı kontrol et
        const { data: existingUser } = await supabaseClient
            .from('messages')
            .select('username')
            .eq('username', user)
            .limit(1);

        // Not: Basit bir kontrol olduğu için sadece mevcut mesajlar içinde arar.
        // Daha gelişmişi için ayrı bir 'users' tablosu gerekir.
        
        localStorage.setItem('spy_username', user);

        await supabaseClient.from('messages').insert([{ 
            username: user, 
            text: text,
            user_id: userId,
            is_admin: isAdmin 
        }]);
        document.getElementById('message').value = '';
    }

    async function fetchMessages() {
        const { data } = await supabaseClient.from('messages').select('*').order('id', { ascending: true });
        const container = document.getElementById('chat-messages');
        container.innerHTML = data.map(m => `
            <div class="msg">
                <span class="user-id">ID: ${m.user_id}</span>
                <b>${m.is_admin ? '👑 ' : ''}${m.username}:</b> ${m.text}
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    supabaseClient.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, fetchMessages).subscribe();
    fetchMessages();
</script>
</body>
</html>
